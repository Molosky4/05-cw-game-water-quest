<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Water Quest - Main Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --screen-width: min(680px, 100%);
      --cw-yellow: #FFC907;
      --cw-blue: #2E9DF7;
      --cw-light-blue: #8BD1CB;
      --cw-green: #4FCB53;
      --cw-dark-green: #159A48;
      --cw-orange: #FF902A;
      --cw-red: #F5402C;
      --cw-pink: #F16061;
      --ink-soft: #697689;
      --panel: #ececec;
      --line: #c7c7c7;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background-image:
        linear-gradient(140deg, rgba(46, 157, 247, 0.24) 0%, rgba(139, 209, 203, 0.28) 46%, rgba(255, 201, 7, 0.2) 100%),
        linear-gradient(rgba(245, 251, 255, 0.74), rgba(232, 246, 242, 0.8)),
        url("img/charity-water.webp");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-blend-mode: multiply, normal, normal;
      color: #333;
      font-family: Avenir, "Avenir Next", Arial, sans-serif;
    }

    .main-shell {
      width: var(--screen-width);
      border-radius: 32px;
      border: 3px solid var(--cw-blue);
      background: linear-gradient(180deg, #f7fcff 0%, #edf8f6 100%);
      box-shadow: inset 0 -8px 0 #d9eef8;
      padding: 14px;
    }

    .hero {
      padding: 0 8px 6px;
    }

    .presented-by {
      margin: 0 0 10px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--cw-dark-green);
    }

    .logo-card {
      background: #eef8ff;
      border: 1px solid #8dc5eb;
      border-radius: 14px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 12px;
      margin-bottom: 14px;
      text-align: center;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .game-title {
      font-family: "Proxima Nova", "Avenir Next", Avenir, sans-serif;
      font-size: clamp(1.2rem, 3.7vw, 1.85rem);
      line-height: 1;
      letter-spacing: 0.06em;
      color: var(--cw-blue);
      margin: 0;
      font-weight: 700;
      text-transform: uppercase;
    }

    .cw-logo {
      width: min(230px, 75vw);
      height: auto;
    }

    .can-card {
      border: 1.5px solid #d8b11f;
      background: #ffe89b;
      border-radius: 12px;
      width: 148px;
      margin: 0 auto 14px;
      padding: 12px 10px;
      text-align: center;
    }

    .can-icon {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
      margin: 0 auto 6px;
    }

    .can-label {
      margin: 0;
      font-family: "Proxima Nova", "Avenir Next", Avenir, sans-serif;
      color: #6b5b2c;
      font-weight: 700;
    }

    .tagline {
      font-size: 1.02rem;
      text-align: center;
      margin: 0 auto 14px;
      color: var(--cw-dark-green);
    }

    .how-title {
      margin: 0 0 8px;
      font-family: "Proxima Nova", "Avenir Next", Avenir, sans-serif;
      color: var(--cw-blue);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .how-to-play {
      border: 1.5px dashed var(--cw-light-blue);
      border-radius: 14px;
      background: #f4fcfb;
      padding: 12px;
      margin-bottom: 12px;
    }

    .how-list {
      margin: 0;
      padding-left: 0;
      list-style: none;
      color: #25643e;
    }

    .how-list li {
      padding: 7px 0;
      border-bottom: 1px solid #dddddd;
      font-size: 0.95rem;
    }

    .how-list li:last-child {
      border-bottom: 0;
    }

    .best-score-pill {
      width: min(360px, 100%);
      margin: 0 auto 12px;
      border: 1px solid var(--cw-orange);
      border-radius: 999px;
      background: #fff3cb;
      color: #22653d;
      text-align: center;
      font-family: "Proxima Nova", "Avenir Next", Avenir, sans-serif;
      padding: 8px 12px;
      font-weight: 700;
    }

    .start-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 68px;
      border-radius: 36px;
      border: 1.5px solid var(--cw-dark-green);
      background: var(--cw-blue);
      color: #ffffff;
      font-family: "Proxima Nova", "Avenir Next", Avenir, sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.24em;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none;
      transition: filter 0.2s ease, transform 0.15s ease;
      margin-bottom: 8px;
    }

    .start-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
      color: #ffffff;
      background: var(--cw-dark-green);
    }

    .leaderboard-link {
      display: block;
      text-align: center;
      color: #7d8795;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .leaderboard-link:hover {
      color: var(--cw-blue);
    }

    @media (max-width: 520px) {
      body {
        padding: 8px;
      }

      .main-shell {
        border-radius: 28px;
        padding: 10px;
      }

      .start-btn {
        font-size: 1.35rem;
      }
    }

    @media (max-width: 768px) {
      .hero {
        padding: 0 4px 4px;
      }

      .logo-card {
        min-height: 96px;
        margin-bottom: 10px;
      }

      .can-card {
        width: 126px;
        margin-bottom: 10px;
      }

      .tagline {
        font-size: 0.95rem;
        margin-bottom: 10px;
      }

      .how-to-play {
        padding: 10px;
        margin-bottom: 10px;
      }

      .how-list li {
        font-size: 0.88rem;
        padding: 6px 0;
      }

      .start-btn {
        min-height: 58px;
        font-size: 1.3rem;
        letter-spacing: 0.16em;
      }
    }

    @media (max-width: 420px) {
      .main-shell {
        border-radius: 22px;
        padding: 8px;
      }

      .game-title {
        font-size: 1.02rem;
      }

      .cw-logo {
        width: min(180px, 62vw);
      }

      .how-title {
        font-size: 0.9rem;
      }

      .best-score-pill {
        font-size: 0.82rem;
        padding: 6px 10px;
      }

      .start-btn {
        min-height: 52px;
        font-size: 1.02rem;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>
<body>
  <main class="main-shell" role="main">
    <section class="hero">
      <p class="presented-by">charity: water presents</p>

      <div class="logo-card">
        <div class="brand-row">
          <h2 class="game-title">Water Quest</h2>
          <img class="cw-logo" src="img/cw_logo_horizontal.png" alt="charity: water logo">
        </div>
      </div>

      <div class="can-card">
        <img class="can-icon" src="img/water-can-transparent.png" alt="Jerry can icon">
        <p class="can-label">Jerry Can</p>
      </div>

      <p class="tagline">Tap jerry cans. Collect clean water drops!</p>

      <article class="how-to-play" aria-label="How to play">
        <h3 class="how-title">How To Play</h3>
        <ul class="how-list">
          <li>👏 Tap yellow jerry cans → +1 point</li>
          <li>💀 Avoid rocks → -2 points</li>
          <li>⏱ 30 seconds on the clock</li>
          <li>🏆 Hit milestones to earn badges</li>
        </ul>
      </article>

      <p id="best-score-pill" class="best-score-pill">🏆 Best Score: 00</p>

      <a class="start-btn" href="game.html">Start Quest</a>
    </section>
  </main>

  <script>
    const bestScore = Number(localStorage.getItem("waterQuestBest") || "0");
    const bestScorePill = document.getElementById("best-score-pill");
    bestScorePill.textContent = `🏆 Best Score: ${String(bestScore).padStart(2, "0")}`;
  </script>
</body>
</html>
